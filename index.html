<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warisan Rasa - Penjelajah Kuliner Nusantara</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="hero">
        <div class="hero-content">
            <h1>Cita Rasa Nusantara</h1>
            <p>Jelajahi kelezatan autentik dari Sabang sampai Merauke.</p>  
        </div>
    </header>

    <main class="container">
        <section class="controls">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Cari nama makanan atau asal daerah...">
            </div>

            <div class="filter-buttons">
                <button class="btn-filter active" data-category="Semua">Semua</button>
                <button class="btn-filter" data-category="Makanan Utama">Makanan Utama</button>
                <button class="btn-filter" data-category="Camilan">Camilan</button>
                <button class="btn-filter" data-category="Sop & Soto">Sop & Soto</button>
                <button class="btn-filter" data-category="Minuman">Minuman</button>
            </div>
        </section>

        <div id="kuliner-list" class="grid-container">
            </div>
    </main>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modalBody">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
